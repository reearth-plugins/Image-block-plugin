id: reearth-plugins-image-overlay
name: Image Overlay
version: 1.0.0
description: Display an image as a non-blocking overlay on the map.
author: reearth-plugins
repository: https://github.com/reearth-plugins/image-overlay

extensions:
  - id: image-overlay
    type: widget
    name: Image Overlay
    description: Shows an image on the map. Set Image URL in the inspector.
    widgetLayout:
      defaultLocation:
        zone: outer
        section: left
        area: top
    schema:
      groups:
        - id: default
          title: Image
          fields:
            - id: imageUrl
              type: url
              title: Image URL
              description: URL of the image to display.
            - id: text
              type: string
              title: Caption text
              description: Optional caption shown under the image.
